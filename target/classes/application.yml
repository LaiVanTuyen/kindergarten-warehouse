server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/warehouse_db?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  
  jpa:
    hibernate:
      ddl-auto: validate # Disable auto-ddl in favor of Flyway
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  messages:
    basename: i18n/messages
    encoding: UTF-8

  flyway:
    enabled: true
    baseline-on-migrate: true # Useful for existing DBs, though this is a new project

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:warehouse-bucket}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

rollbar:
  access-token: ${ROLLBAR_ACCESS_TOKEN}
  enabled: true
  environment: ${ROLLBAR_ENV:development}
  framework: spring-boot
