# ===========================================================
# Docker Compose — Kindergarten Warehouse
# ===========================================================
# Dev : docker compose --env-file .env up -d --build
# Prod: docker compose --env-file .env.prod up -d --build

# 1. Chỉ bật MySQL + Redis + MinIO trong Docker
# docker compose --env-file .env up -d mysql redis minio

# Biến môi trường được đọc từ file --env-file (mặc định là .env).
# TẤT CẢ file .env* (trừ .env.example) đã được .gitignore.
# ===========================================================

services:
  mysql:
    image: mysql:8.0
    container_name: warehouse_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    ports:
      # Bind 127.0.0.1 → chỉ truy cập được từ chính VPS, không ra internet
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - warehouse-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: warehouse_redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - warehouse-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: warehouse_minio
    command: server /data --console-address ":9001"
    restart: always
    ports:
      # Data port 9000 expose public (FE cần lấy ảnh/video trực tiếp) — chịu trách nhiệm với bucket policy
      - "9000:9000"
      # Console port 9001 chỉ cho localhost (sau reverse proxy qua nginx nếu cần)
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BROWSER_REDIRECT_URL: https://${DOMAIN_NAME}/minio/
    volumes:
      - minio_data:/data
    networks:
      - warehouse-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  app:
    build: .
    container_name: warehouse_app
    restart: always
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      # Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # Database (host cứng là service name trong mạng docker)
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: https://${DOMAIN_NAME}/minio
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      # Admin seed (bắt buộc khi profile=prod để tránh admin123 mặc định)
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:?APP_ADMIN_EMAIL is required}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:?APP_ADMIN_PASSWORD is required}

      # Mail
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Cookie
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-None}

      # CORS + domain
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DOMAIN_NAME: ${DOMAIN_NAME}

      # Rollbar
      ROLLBAR_ACCESS_TOKEN: ${ROLLBAR_ACCESS_TOKEN:-}
      ROLLBAR_ENABLED: ${ROLLBAR_ENABLED:-false}
      ROLLBAR_ENV: ${ROLLBAR_ENV:-production}

      # External APIs
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - warehouse-network

volumes:
  mysql_data:
  minio_data:
  redis_data:


networks:
  warehouse-network:
    driver: bridge
