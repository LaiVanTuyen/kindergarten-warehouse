spring:
  datasource:
    url: ${DB_URL}?useSSL=true&requireSSL=true&verifyServerCertificate=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl: true

minio:
  endpoint: ${MINIO_ENDPOINT} # Should be https://...
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  cors:
    allowed-origins: https://kinder-world.vercel.app
  cookie:
    secure: true
    same-site: None
