server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate # Disable auto-ddl in favor of Flyway
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  messages:
    basename: i18n/messages
    encoding: UTF-8

  flyway:
    enabled: true
    baseline-on-migrate: true # Useful for existing DBs, though this is a new project

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

firebase:
  config:
    path: ${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}
  storage:
    bucket: ${FIREBASE_BUCKET_NAME}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
