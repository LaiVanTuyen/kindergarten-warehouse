server:
  port: ${APP_PORT:8080}

spring:
  datasource:
    # Tự động ghép chuỗi kết nối từ Host, Port và DB Name
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:warehouse_db}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:} # Để trống nếu không có pass
  
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  
  jpa:
    hibernate:
      ddl-auto: update # Ở local nên để update để tự tạo bảng, Prod thì để validate/none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true # Format log SQL cho dễ nhìn

  messages:
    basename: i18n/messages
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Cấu hình MinIO khớp với biến môi trường chuẩn của MinIO Docker
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}      # Đã sửa để khớp với .env
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}  # Đã sửa để khớp với .env
  bucket-name: ${MINIO_BUCKET_NAME:warehouse-bucket} # Đã sửa để khớp với .env

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Rollbar Configuration
rollbar:
  access-token: ${ROLLBAR_ACCESS_TOKEN}
  enabled: ${ROLLBAR_ENABLED:false}
  environment: ${ROLLBAR_ENV:development}
  framework: spring-boot

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}
