# =====================================================================
# Nginx - Reverse Proxy Configuration for Kindergarten Warehouse
# Đặt file này tại: /etc/nginx/sites-available/warehouse
# Sau đó chạy: sudo ln -s /etc/nginx/sites-available/warehouse /etc/nginx/sites-enabled/
# =====================================================================

# Rate limiting - Giới hạn số request để chống DDoS
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# =====================================================================
# HTTP -> HTTPS Redirect (Certbot sẽ tự thêm block này)
# =====================================================================
server {
    listen 80;
    server_name api.yourdomain.com;

    # Certbot sẽ thêm nội dung vào đây tự động khi bạn chạy certbot
    return 301 https://$host$request_uri;
}

# =====================================================================
# HTTPS - Spring Boot API Reverse Proxy
# =====================================================================
server {
    listen 443 ssl;
    server_name api.yourdomain.com;

    # SSL Certificates (Certbot sẽ điền tự động)
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # File Upload Size (khớp với cấu hình Spring Boot)
    client_max_body_size 50M;

    # API Proxy -> Spring Boot Container
    location / {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# =====================================================================
# HTTPS - MinIO S3 API (nếu muốn public endpoint riêng)
# =====================================================================
server {
    listen 443 ssl;
    server_name cdn.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/cdn.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.yourdomain.com/privkey.pem;

    # MinIO Proxy -> MinIO Container
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # MinIO needs large body for uploads
        client_max_body_size 100M;
        proxy_buffering off;
    }

    # MinIO Console Web UI
    location /minio/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
